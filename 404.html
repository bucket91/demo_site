<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <button class="sidebar-toggle" onclick="toggleSidebar()">&#9776;</button>
    <h1><a href="./index.html">Placeholder</a></h1>
        <button class="theme-toggle" onclick="toggleTheme()">☀️</button>
  </header>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-owner">
        <img src="avatar.jpg" alt="Jon Doe" class="owner-avatar">
        <div class="owner-name">Jon Doe</div>
        <div class="owner-title">Maniac</div>
        <div class="owner-bio">fugaisv uahfi8asfuxb ausgiavsc   asugcuavsc</div>
      </div>
      <div class="sidebar-top">
        <h2>Menu</h2>
        <button class="close-btn" onclick="toggleSidebar()">&times;</button>
      </div>
      <div class="category">
        <div class="category-header" onclick="toggleCategory(this)">
          blog <span class="arrow">&#9654;</span>
        </div>
        <ul class="sub-links">
          <li><a href="blog/test1.html">Test1</a></li>
        </ul>
      </div>

    </aside>
    <main>
<div class="home-hero">
      <h1>404</h1>
      <p class="home-tagline">Page not found</p>
      <p style="margin-top:1rem"><a href="index.html">Go home</a></p>
    </div>
    </main>
  <div id="comments-section" data-page="/404">
    <h3>Comments</h3>
    <div id="comments-list"></div>
    <form id="comment-form">
      <input id="comment-name" type="text" placeholder="Your name" required>
      <textarea id="comment-body" placeholder="Write a comment..." required></textarea>
      <button type="submit">Post Comment</button>
    </form>
  </div>
  <script>
const SUPABASE_URL = 'https://oorgvolgpoapoediiuxy.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_29CWP0eIwfFupRdHAe5Czg_uLDo0oT5';
(function() {
  var section = document.getElementById('comments-section');
  var page = section ? section.getAttribute('data-page') : '/';
  async function loadComments() {
    var res = await fetch(
      SUPABASE_URL + '/rest/v1/comments?page=eq.' + encodeURIComponent(page) + '&order=created_at.desc',
      { headers: { apikey: SUPABASE_ANON_KEY } }
    );
    if (!res.ok) return;
    var comments = await res.json();
    var list = document.getElementById('comments-list');
    if (!list) return;
    if (comments.length === 0) {
      list.innerHTML = '<p class="no-comments">No comments yet.</p>';
      return;
    }
    list.innerHTML = comments.map(function(c) {
      return '<div class="comment">' +
        '<div class="comment-header">' +
          '<strong>' + esc(c.name) + '</strong>' +
          '<span class="comment-date">' + new Date(c.created_at).toLocaleDateString() + '</span>' +
        '</div>' +
        '<p>' + esc(c.body) + '</p>' +
      '</div>';
    }).join('');
  }
  async function submitComment(e) {
    e.preventDefault();
    var nameInput = document.getElementById('comment-name');
    var bodyInput = document.getElementById('comment-body');
    var name = nameInput.value.trim();
    var body = bodyInput.value.trim();
    if (!name || !body) return;
    var btn = e.target.querySelector('button');
    btn.disabled = true;
    await fetch(SUPABASE_URL + '/rest/v1/comments', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        apikey: SUPABASE_ANON_KEY,
        Prefer: 'return=representation'
      },
      body: JSON.stringify({ page: page, name: name, body: body })
    });
    nameInput.value = '';
    bodyInput.value = '';
    btn.disabled = false;
    loadComments();
  }
  function esc(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }
  document.addEventListener('DOMContentLoaded', function() {
    var form = document.getElementById('comment-form');
    if (form) {
      form.addEventListener('submit', submitComment);
      loadComments();
    }
  });
})();
  </script>
  </div>
  <script>
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
    }
    function toggleCategory(header) {
      header.classList.toggle('active');
      header.querySelector('.arrow').classList.toggle('open');
      header.nextElementSibling.classList.toggle('open');
    }
  </script>
  <script>
    function toggleTheme() {
      document.body.classList.toggle('dark-mode');
      var b = document.body.classList.contains('dark-mode');
      localStorage.setItem('theme', b ? 'dark' : 'light');
      document.querySelector('.theme-toggle').textContent = b ? '\u{1F319}' : '\u2600\uFE0F';
    }
    (function() {
      var btn = document.querySelector('.theme-toggle');
      if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
        if (btn) btn.textContent = '\u{1F319}';
      }
    })();
  </script>
</body>
</html>
