name: Build Site Tools

on:
  push:
    branches: ["*"]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt5 pyinstaller python-docx

      - name: Download git (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -sL -o git-linux.tar.gz https://github.com/darkvertex/static-git/releases/latest/download/git-binaries.linux-64bit.tar.gz
          mkdir -p bundled-git
          tar -xzf git-linux.tar.gz -C bundled-git --strip-components=1
          rm git-linux.tar.gz
          chmod +x bundled-git/*
        shell: bash
        working-directory: ${{ github.workspace }}

      - name: Download MinGit (Windows)
        if: runner.os == 'Windows'
        run: |
          curl -sL -o mingit.zip https://github.com/git-for-windows/git/releases/download/v2.48.1.windows.1/MinGit-2.48.1-64-bit.zip
          unzip -q mingit.zip -d mingit
          rm mingit.zip
        shell: bash
        working-directory: ${{ github.workspace }}

      - name: Build executable
        run: |
          DATA_ARGS=""
          if [ "${{ runner.os }}" = "Windows" ]; then
            DATA_ARGS="--add-data mingit:mingit"
          else
            DATA_ARGS="--add-data bundled-git:bundled-git"
          fi
          pyinstaller --onefile --name SiteTools \
            --hidden-import PyQt5.sip \
            --hidden-import PyQt5.QtCore \
            --hidden-import PyQt5.QtGui \
            --hidden-import PyQt5.QtWidgets \
            $DATA_ARGS app.py
        shell: bash
        working-directory: ${{ github.workspace }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SiteTools-${{ runner.os }}
          path: dist/SiteTools*
