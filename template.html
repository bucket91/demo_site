<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <link rel="stylesheet" href="{{STYLE_PATH}}">
  <link rel="stylesheet" href="{{ADVANCED_STYLE_PATH}}">
</head>
<body>
{{VIDEO_BG}}
  <header>
    <button class="sidebar-toggle" onclick="toggleSidebar()">&#9776;</button>
    <h1><a href="{{HOME_PATH}}">{{SITE_TITLE}}</a></h1>
{{THEME_TOGGLE}}
  </header>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
{{SIDEBAR}}
    </aside>
    <main>
{{CONTENT}}
    </main>
{{COMMENTS}}
  </div>
  <script>
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
    }
    function toggleCategory(header) {
      header.classList.toggle('active');
      header.querySelector('.arrow').classList.toggle('open');
      header.nextElementSibling.classList.toggle('open');
    }
  </script>
  <script>
    function toggleTheme() {
      document.body.classList.toggle('dark-mode');
      var b = document.body.classList.contains('dark-mode');
      localStorage.setItem('theme', b ? 'dark' : 'light');
      document.querySelector('.theme-toggle').textContent = b ? '\u{1F319}' : '\u2600\uFE0F';
    }
    (function() {
      var btn = document.querySelector('.theme-toggle');
      if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
        if (btn) btn.textContent = '\u{1F319}';
      }
    })();
  </script>
</body>
</html>
