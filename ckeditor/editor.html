function prettyPrintHTML(html) {
var blocks = ['address','article','aside','blockquote','body','canvas','caption','dd','div','dl','dt','fieldset','figcaption','figure','footer','form','h1','h2','h3','h4','h5','h6','header','hr','html','li','main','nav','noscript','ol','p','pre','section','table','tfoot','ul','video','tr','td','th','thead','tbody','tfoot'];
html = html.replace(/\r\n?/g, '\n').replace(/\n/g, ' ').replace(/>\s+</g, '><').trim();
var parts = html.split(/(<[^>]+>)/);
var out = '', indent = 0, sp = '  ';
for (var i = 0; i < parts.length; i++) {
var p = parts[i];
if (!p) continue;
if (p[0] === '<' && p[p.length - 1] === '>') {
var isClose = p[1] === '/';
var tag = p.replace(/^<\/?([^\s>/]+).*$/, '$1').toLowerCase();
var isSelfClose = p.indexOf('/>') === p.length - 2 || ['br','hr','img','input','meta','link','area','base','col','embed','param','source','track','wbr'].indexOf(tag) !== -1;

if (blocks.indexOf(tag) !== -1) out += '\n' + sp.repeat(indent);
out += p;
if (!isClose && !isSelfClose && blocks.indexOf(tag) !== -1) indent++;
} else {
var t = p.trim();
if (t) out += '\n' + sp.repeat(indent) + t;
}
}
return out.trim();
}

  <div id="comments-section" data-page="/ckeditor/editor">
    <h3>Comments</h3>
    <div id="comments-list"></div>
    <form id="comment-form">
      <input id="comment-name" type="text" placeholder="Your name" required>
      <textarea id="comment-body" placeholder="Write a comment..." required></textarea>
      <button type="submit">Post Comment</button>
    </form>
  </div>
  <script>
const SUPABASE_URL = 'https://oorgvolgpoapoediiuxy.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_29CWP0eIwfFupRdHAe5Czg_uLDo0oT5';
(function() {
  var section = document.getElementById('comments-section');
  var page = section ? section.getAttribute('data-page') : '/';
  async function loadComments() {
    var res = await fetch(
      SUPABASE_URL + '/rest/v1/comments?page=eq.' + encodeURIComponent(page) + '&order=created_at.desc',
      { headers: { apikey: SUPABASE_ANON_KEY } }
    );
    if (!res.ok) return;
    var comments = await res.json();
    var list = document.getElementById('comments-list');
    if (!list) return;
    if (comments.length === 0) {
      list.innerHTML = '<p class="no-comments">No comments yet.</p>';
      return;
    }
    list.innerHTML = comments.map(function(c) {
      return '<div class="comment">' +
        '<div class="comment-header">' +
          '<strong>' + esc(c.name) + '</strong>' +
          '<span class="comment-date">' + new Date(c.created_at).toLocaleDateString() + '</span>' +
        '</div>' +
        '<p>' + esc(c.body) + '</p>' +
      '</div>';
    }).join('');
  }
  async function submitComment(e) {
    e.preventDefault();
    var nameInput = document.getElementById('comment-name');
    var bodyInput = document.getElementById('comment-body');
    var name = nameInput.value.trim();
    var body = bodyInput.value.trim();
    if (!name || !body) return;
    var btn = e.target.querySelector('button');
    btn.disabled = true;
    await fetch(SUPABASE_URL + '/rest/v1/comments', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        apikey: SUPABASE_ANON_KEY,
        Prefer: 'return=representation'
      },
      body: JSON.stringify({ page: page, name: name, body: body })
    });
    nameInput.value = '';
    bodyInput.value = '';
    btn.disabled = false;
    loadComments();
  }
  function esc(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }
  document.addEventListener('DOMContentLoaded', function() {
    var form = document.getElementById('comment-form');
    if (form) {
      form.addEventListener('submit', submitComment);
      loadComments();
    }
  });
})();
  </script>
  </div>
